@if (isLoadingProducts() || isLoadingCategories()) {
  <coaster-loading />
}

<div class="flex items-center gap-3">
  <button mat-icon-button (click)="goBack()">
    <mat-icon class="text-[22px]! w-[22px]! h-[22px]! leading-[22px]! m-0!">arrow_back</mat-icon>
  </button>
  <h2 class="heading-2 flex-1!">
    {{ isAddItemsMode() ? ('orders.add_items_title' | translate) : ('orders.pos_title' | translate) }}
  </h2>
</div>

<div class="flex flex-col gap-6 relative">
  <div class="flex flex-col gap-4 w-full min-w-0">
    <coaster-pos-search [(query)]="searchQuery" />
    <coaster-pos-category-selector [categories]="categories()" [(selectedCategory)]="selectedCategory" />
    <coaster-pos-products-list [products]="filteredProducts()" (productClicked)="addToCart($event)" />
  </div>

  <div class="w-full shrink-0 sticky bottom-4 z-10 pb-4">
    <coaster-pos-cart
      class="block bg-surface-container-low rounded-2xl shadow-2xl border border-outline-variant/10 p-4"
      [items]="cartItems()"
      [tables]="isAddItemsMode() ? [] : tables()"
      [selectedTableId]="selectedTableId()"
      [disabled]="isSubmitting()"
      [tableLocked]="tableLocked()"
      (incrementClicked)="incrementItem($event)"
      (decrementClicked)="decrementItem($event)"
      (tableSelected)="selectedTableId.set($event)"
      (itemNotesChanged)="updateItemNotes($event)"
      [orderNotes]="orderNotes()"
      (orderNotesChanged)="orderNotes.set($event)"
      (submitClicked)="submitOrder()"
    />
  </div>
</div>
