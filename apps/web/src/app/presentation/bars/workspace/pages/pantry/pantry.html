<div class="flex gap-4 mb-6">
  <coaster-stat-card
    class="flex-1"
    [label]="'pantry.total' | translate"
    [value]="totalProductsCount() ?? 0"
    size="large"
  />
  <coaster-stat-card
    class="flex-1"
    [label]="'pantry.critical' | translate"
    [value]="criticalProductsCount() ?? 0"
    tone="error"
    size="large"
  />
  <coaster-stat-card
    class="flex-1"
    [label]="'pantry.alerts' | translate"
    [value]="alertProductsCount() ?? 0"
    tone="tertiary"
    size="large"
  />
</div>

<div class="flex items-center justify-between gap-4 mb-2">
  <h2 class="heading-2 mb-0">{{ 'pantry.inventory_title' | translate }}</h2>
  @if (canImportTemplates()) {
    <button mat-flat-button [routerLink]="['import']">
      <mat-icon>download</mat-icon>
      <span>{{ 'pantry.import_title' | translate }}</span>
    </button>
  }
</div>

<div class="mb-4 w-full">
  <coaster-pantry-search [query]="searchQuery()" (queryChange)="searchQuery.set($event)" />
</div>

<div class="-mx-4 px-4 mb-4 overflow-hidden">
  <coaster-category-filter
    [categories]="categories.value() ?? []"
    [(selectedCategoryId)]="selectedCategoryId"
    [editable]="canUpdateCategory()"
    (editCategoryClicked)="onEditCategoryClicked($event)"
  />
</div>

@if (categories.isLoading() || products.isLoading()) {
  <coaster-loading />
}

<div class="flex-1">
  <div class="grid gap-4">
    @for (product of filteredProducts(); track product.id) {
      <coaster-inventory-item-card
        class="product"
        [itemName]="product.name"
        [qty]="product.currentStock"
        [price]="product.price"
        [imageUrl]="product.imageUrl"
        [statusLevel]="product.stockStatus"
        [showEditButton]="canUpdateProduct()"
        (click)="onProductClicked(product)"
        (editClicked)="onEditProductClicked(product)"
        (deleteClicked)="handleDeleteProductClicked(product)"
      />
    } @empty {
      <div class="text-center text-on-surface-variant mt-10">{{ 'pantry.empty' | translate }}</div>
    }
  </div>
</div>

@if (canCreateProduct()) {
  <coaster-fab data-testid="create-pantry-fab" (click)="onCreatePantryClicked()" />
}
