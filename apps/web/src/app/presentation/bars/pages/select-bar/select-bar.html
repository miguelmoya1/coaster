<div class="flex flex-col gap-2 items-center text-center mb-6">
  <h1 class="heading-1">{{ 'bars.select.title' | translate }}</h1>
  <p class="text-on-surface-variant text-sm">{{ 'bars.select.subtitle' | translate }}</p>
</div>

<div class="flex flex-col gap-4">
  @if (bars.isLoading()) {
    <coaster-loading />
  }

  @if (bars.hasValue()) {
    @for (bar of bars.value(); track bar.id) {
      <coaster-bar-card [bar]="bar" (click)="selectBar(bar.id)" />
    } @empty {
      <div
        class="flex flex-col items-center justify-center p-8 bg-surface-container rounded-xl border border-dashed border-outline-variant text-center gap-3"
      >
        <span class="text-on-surface-variant font-medium">
          {{ 'bars.select.empty' | translate }}
        </span>
      </div>
    }

    <button mat-stroked-button type="button" (click)="navigateToCreate()" class="mt-2 h-24 w-full border-2 border-dashed border-outline-variant hover:border-primary hover:bg-primary/5 text-on-surface-variant hover:text-primary font-bold uppercase tracking-widest text-sm">
      <mat-icon class="text-on-surface-variant text-xl hover:text-primary">add_circle</mat-icon>
      {{ 'common.create' | translate }}
    </button>

    @if (isAdmin()) {
      <button mat-stroked-button type="button" (click)="navigateToAdminTemplates()" class="mt-2 h-16 w-full border-primary/30 hover:border-primary/60 text-primary">
        <mat-icon class="text-primary text-xl">settings</mat-icon>
        {{ 'bars.select.admin_templates' | translate }}
      </button>
    }
  }
</div>
