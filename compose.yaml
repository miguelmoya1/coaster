services:
  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: coaster
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d coaster']
      interval: 5s
      timeout: 5s
      retries: 5

  firebase:
    build:
      context: ./apps/firebase
      dockerfile: Dockerfile
    ports:
      - '9099:9099'
      - '4000:4000'
    volumes:
      - ./apps/firebase:/app
      - /app/node_modules

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile.dev
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgres://admin:admin@db:5432/coaster
      - FIREBASE_AUTH_EMULATOR_HOST=firebase:9099
    depends_on:
      db:
        condition: service_healthy
      firebase:
        condition: service_started
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/common/node_modules

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.dev
    ports:
      - '4200:4200'
    environment:
      - API_URL=http://localhost:3000
    depends_on:
      api:
        condition: service_started
      firebase:
        condition: service_started
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/common/node_modules

volumes:
  postgres_data:
