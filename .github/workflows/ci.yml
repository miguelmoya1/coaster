name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: 'read'
  id-token: 'write'

env:
  GCP_PROJECT_ID: 'coaster-437f2'
  GCP_REGION: 'europe-southwest1'
  GCP_SERVICE_NAME: 'api'
  GCP_JOB_NAME: 'api-migrate'
  GCP_IMAGE_NAME: 'europe-southwest1-docker.pkg.dev/coaster-437f2/coaster-repo/api'

jobs:
  build-and-test:
    name: 🧪 Tests & Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🗄️ Generate Prisma Client
        run: npm run db:gen -w apps/api

      - name: 🏗️ Build All (Common, API, Web)
        run: |
          npm run build -w @coaster/common
          npm run build -w @coaster/api
          npm run build -w @coaster/web

      - name: 🧹 Lint
        run: npm run lint

      - name: 🧪 Unit Tests
        run: npm run test

      - name: 🧪 Backend E2E Tests
        run: npm run test:e2e -w @coaster/api

      - name: 🌐 Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: 🧪 Frontend E2E Tests
        run: npm run e2e -w @coaster/web

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: apps/printer-service/go.sum

      - name: 🧪 Go Unit Tests (Printer Service)
        run: cd apps/printer-service && go test -v ./... -cover

  deploy-backend:
    name: 🚀 Deploy Backend & Migrate DB
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/774617138158/locations/global/workloadIdentityPools/github/providers/my-repo'
          service_account: 'github-actions@coaster-437f2.iam.gserviceaccount.com'

      - name: 🐳 Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 🔑 Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: 🏗️ Build & Push Docker Image
        run: |
          docker build -t ${{ env.GCP_IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.GCP_IMAGE_NAME }}:${{ github.sha }}

      - name: 🗄️ Run Prisma Migrations (Cloud Run Job)
        run: |
          gcloud run jobs update ${{ env.GCP_JOB_NAME }} \
            --image ${{ env.GCP_IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --command "npx,prisma,migrate,deploy,--config=apps/api/prisma.config.ts"
            
          gcloud run jobs execute ${{ env.GCP_JOB_NAME }} --region ${{ env.GCP_REGION }} --wait

      - name: 🌐 Deploy API to Cloud Run Service
        run: |
          gcloud run deploy ${{ env.GCP_SERVICE_NAME }} \
            --image ${{ env.GCP_IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated
