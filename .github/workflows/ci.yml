name: CI (Continuous Integration)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  build-and-test:
    name: Check Quality
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm i --legacy-peer-deps

      - name: 🏗️ Build Common Library
        run: npm run build -w @coaster/common

      - name: 🗄️ Generate Prisma Client
        run: npm run db:gen -w apps/api

      - name: 🚀 Build
        run: npm run build

      - name: 🧹 Lint
        run: npm run lint

      - name: 🧪 Test Unitarios
        run: npm run test

      # - name: 🎭 Install Browsers (Playwright E2E)
      #   run: npx playwright install --with-deps

      # - name: 🕵️ Test E2E
      #   run: npm run test:e2e
