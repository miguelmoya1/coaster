name: CI (Integración Continua)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  build-and-test:
    name: Check Quality
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js (Latest version)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: 🎭 Install Browsers (Playwright E2E)
        run: npx playwright install --with-deps

      - name: 🚀 Build, Lint & Test
        run: |
          npm run build
          npm run lint
          npm test
          npm run test:e2e
